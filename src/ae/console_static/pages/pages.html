<div class="space-y-8">
  <div>
    <h2 class="text-2xl font-bold mb-4" style="color: #00f0ff;">Pages</h2>
    <p class="text-sm mb-6" style="color: #8888a0;">Manage landing pages and bulk operations</p>
  </div>

  <!-- Filters -->
  <div class="card mb-6">
    <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
      <div class="flex gap-3 flex-wrap">
        <input id="client_id" class="px-4 py-2.5 text-sm rounded-lg border bg-transparent font-mono"
               style="border-color: #2a2a3e; color: #e0e0e8; width: 140px;" placeholder="client_id"/>
        <input id="template_id" class="px-4 py-2.5 text-sm rounded-lg border bg-transparent font-mono"
               style="border-color: #2a2a3e; color: #e0e0e8; width: 140px;" placeholder="template_id"/>
        <input id="geo_city" class="px-4 py-2.5 text-sm rounded-lg border bg-transparent"
               style="border-color: #2a2a3e; color: #e0e0e8; width: 140px;" placeholder="geo_city"/>
        <select id="page_status" class="px-4 py-2.5 text-sm rounded-lg border bg-transparent"
                style="border-color: #2a2a3e; color: #e0e0e8;">
          <option value="">status:any</option>
          <option value="draft">draft</option>
          <option value="live">live</option>
          <option value="paused">paused</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="loadPages()">Load Pages</button>
    </div>
  </div>

  <!-- Pages List -->
  <div id="pages" class="scrollable-container rounded-lg p-6 border font-mono text-xs"
       style="background: #151520; border-color: #2a2a3e; color: #e0e0e8; min-height: 400px;">
    <div class="empty-state">
      <div class="spinner" style="margin: 0 auto;"></div>
      <div class="empty-state-title mt-4">Loading pages...</div>
    </div>
  </div>

  <!-- Bulk Operations -->
  <div class="card mt-6">
    <h3 class="text-lg font-bold mb-4" style="color: #00f0ff;">Bulk Operations</h3>
    <div class="flex flex-wrap gap-2 mb-4">
      <button class="btn btn-secondary" onclick="bulkValidate()">Bulk Validate</button>
      <button class="btn btn-secondary" onclick="bulkPublish(false)">Bulk Publish (dry-run)</button>
      <button class="btn btn-primary" onclick="bulkPublish(true)">Bulk Publish (execute)</button>
    </div>
    <div id="bulk" class="scrollable-container rounded-lg p-6 border font-mono text-xs"
         style="background: #151520; border-color: #2a2a3e; color: #e0e0e8; min-height: 200px;">
      <div class="empty-state">
        <div class="empty-state-icon" style="font-size: 64px; opacity: 0.6;">⚙️</div>
        <div class="empty-state-title" style="font-size: 18px; margin-bottom: 12px;">No bulk operation run</div>
        <div class="empty-state-description" style="font-size: 14px;">Run a bulk validate or publish operation above</div>
      </div>
    </div>
  </div>
</div>

<script>
// Load pages when page loads
(async function() {
  await new Promise(resolve => setTimeout(resolve, 100));
  if (typeof loadPages === 'function') {
    await loadPages();
  } else {
    console.error('loadPages function not found');
    const pagesEl = document.getElementById('pages');
    if (pagesEl) {
      pagesEl.innerHTML = '<div class="empty-state"><div class="empty-state-icon" style="color: #ff0040;">⚠️</div><div class="empty-state-title" style="color: #ff0040;">Error</div><div class="empty-state-description">loadPages function not available</div></div>';
    }
  }
})();
</script>
