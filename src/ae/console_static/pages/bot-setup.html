<div class="space-y-8">
  <div>
    <h2 class="text-2xl font-bold mb-4" style="color: #00f0ff;">Bot Setup</h2>
    <p class="text-sm mb-6" style="color: #8888a0;">Configure chat channels and bot integrations</p>
  </div>

  <!-- Create New Chat Channel -->
  <div class="card mb-6">
    <h3 class="text-lg font-bold mb-4" style="color: #00f0ff;">Create New Chat Channel</h3>
    <form id="create-channel-form" class="space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs mb-2" style="color: #8888a0;">Channel ID *</label>
          <input id="channel_id" type="text" required class="w-full px-4 py-2.5 text-sm rounded-lg border bg-transparent font-mono"
                 style="border-color: #2a2a3e; color: #e0e0e8;" placeholder="ch-client-telegram"/>
        </div>
        <div>
          <label class="block text-xs mb-2" style="color: #8888a0;">Provider *</label>
          <select id="provider" required class="w-full px-4 py-2.5 text-sm rounded-lg border bg-transparent"
                  style="border-color: #2a2a3e; color: #e0e0e8;">
            <option value="telegram">Telegram</option>
            <option value="whatsapp">WhatsApp</option>
            <option value="line">LINE</option>
            <option value="messenger">Messenger</option>
            <option value="sms">SMS</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div>
          <label class="block text-xs mb-2" style="color: #8888a0;">Handle/Phone *</label>
          <input id="handle" type="text" required class="w-full px-4 py-2.5 text-sm rounded-lg border bg-transparent font-mono"
                 style="border-color: #2a2a3e; color: #e0e0e8;" placeholder="+66-80-000-0000 or @username"/>
        </div>
        <div>
          <label class="block text-xs mb-2" style="color: #8888a0;">Display Name (optional)</label>
          <input id="display_name" type="text" class="w-full px-4 py-2.5 text-sm rounded-lg border bg-transparent"
                 style="border-color: #2a2a3e; color: #e0e0e8;" placeholder="Client Support Bot"/>
        </div>
        <div class="md:col-span-2">
          <label class="block text-xs mb-2" style="color: #8888a0;">Meta JSON (optional, JSON format)</label>
          <textarea id="meta_json" rows="3" class="w-full px-4 py-2.5 text-sm rounded-lg border bg-transparent font-mono"
                    style="border-color: #2a2a3e; color: #e0e0e8;" placeholder='{"client_id": "client-id", "webhook_url": "https://..."}'></textarea>
        </div>
      </div>
      <div class="flex gap-3">
        <button type="submit" class="btn btn-primary">Create Channel</button>
        <button type="button" class="btn btn-secondary" onclick="resetChannelForm()">Reset</button>
      </div>
    </form>
  </div>

  <!-- Telegram Bot Configuration -->
  <div class="card mb-6">
    <h3 class="text-lg font-bold mb-4" style="color: #00f0ff;">Telegram Bot Configuration</h3>
    <div class="space-y-4">
      <div>
        <label class="block text-xs mb-2" style="color: #8888a0;">Bot Token</label>
        <input id="telegram_bot_token" type="password" class="w-full px-4 py-2.5 text-sm rounded-lg border bg-transparent font-mono"
               style="border-color: #2a2a3e; color: #e0e0e8;" placeholder="123456789:ABCdefGHIjklMNOpqrsTUVwxyz"/>
        <p class="text-xs mt-1" style="color: #555566;">Get your bot token from @BotFather on Telegram</p>
      </div>
      <div>
        <label class="block text-xs mb-2" style="color: #8888a0;">Chat ID (for notifications)</label>
        <input id="telegram_chat_id" type="text" class="w-full px-4 py-2.5 text-sm rounded-lg border bg-transparent font-mono"
               style="border-color: #2a2a3e; color: #e0e0e8;" placeholder="-1001234567890"/>
        <p class="text-xs mt-1" style="color: #555566;">Chat ID where bot notifications will be sent</p>
      </div>
      <div class="flex gap-3">
        <button class="btn btn-primary" onclick="saveTelegramConfig()">Save Telegram Config</button>
        <button class="btn btn-secondary" onclick="testTelegramConnection()">Test Connection</button>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="card mb-6">
    <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
      <div class="flex gap-3 flex-wrap">
        <select id="filter_provider" class="px-4 py-2.5 text-sm rounded-lg border bg-transparent"
                style="border-color: #2a2a3e; color: #e0e0e8;">
          <option value="">provider:any</option>
          <option value="telegram">Telegram</option>
          <option value="whatsapp">WhatsApp</option>
          <option value="line">LINE</option>
          <option value="messenger">Messenger</option>
          <option value="sms">SMS</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="loadChatChannels()">Load Channels</button>
    </div>
  </div>

  <!-- Chat Channels List -->
  <div id="channels-list" class="scrollable-container rounded-lg p-6 border"
       style="background: #151520; border-color: #2a2a3e; color: #e0e0e8; min-height: 400px;">
    <div class="empty-state">
      <div class="spinner" style="margin: 0 auto;"></div>
      <div class="empty-state-title mt-4">Loading chat channels...</div>
    </div>
  </div>
</div>

<script>
async function loadChatChannels() {
  const listEl = document.getElementById('channels-list');
  if (!listEl) return;
  
  listEl.innerHTML = '<div class="empty-state"><div class="spinner" style="margin: 0 auto;"></div><div class="empty-state-title mt-4">Loading...</div></div>';
  
  try {
    const db = q("db") || "acq.db";
    const params = new URLSearchParams({db});
    
    const provider = document.getElementById('filter_provider')?.value;
    if (provider) params.append('provider', provider);
    
    const response = await api(`/api/chat/channels?${params.toString()}`);
    const channels = response.items || response || [];
    
    if (channels.length === 0) {
      listEl.innerHTML = '<div class="empty-state"><div class="empty-state-icon" style="font-size: 64px; opacity: 0.6;">🤖</div><div class="empty-state-title" style="font-size: 18px; margin-bottom: 12px;">No chat channels found</div><div class="empty-state-description" style="font-size: 14px;">Create a new chat channel using the form above</div></div>';
      return;
    }
    
    listEl.innerHTML = '';
    for (const channel of channels) {
      const card = document.createElement('div');
      card.className = 'card mb-3';
      card.style.cssText = 'padding: 16px; border-color: #2a2a3e;';
      
      const providerColors = {
        telegram: '#0088cc',
        whatsapp: '#25D366',
        line: '#00C300',
        messenger: '#0084ff',
        sms: '#8888a0'
      };
      const providerColor = providerColors[channel.provider] || '#8888a0';
      
      card.innerHTML = `
        <div class="flex flex-wrap items-center justify-between gap-3 mb-3">
          <div class="flex-1">
            <div class="font-mono text-sm font-bold mb-1" style="color: #00f0ff;">${escapeHtml(channel.channel_id)}</div>
            <div class="text-lg font-semibold mb-1" style="color: #e0e0e8;">${escapeHtml(channel.display_name || channel.handle)}</div>
            <div class="text-xs mb-1" style="color: #8888a0;">Handle: ${escapeHtml(channel.handle)}</div>
            ${channel.meta_json && Object.keys(channel.meta_json).length > 0 ? 
              `<div class="text-xs" style="color: #555566;">Meta: ${escapeHtml(JSON.stringify(channel.meta_json))}</div>` : ''}
          </div>
          <div class="flex items-center gap-2">
            <span class="px-3 py-1 rounded-full text-xs font-bold" style="background: rgba(0, 136, 204, 0.1); color: ${providerColor}; border: 1px solid ${providerColor};">
              ${escapeHtml(channel.provider)}
            </span>
          </div>
        </div>
        <div class="flex flex-wrap gap-2">
          <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;" onclick="editChannel('${escapeHtml(channel.channel_id)}')">✏️ Edit</button>
          <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;" onclick="testChannel('${escapeHtml(channel.channel_id)}')">🧪 Test</button>
          <button class="btn btn-danger" style="padding: 6px 12px; font-size: 12px;" onclick="deleteChannel('${escapeHtml(channel.channel_id)}')">🗑️ Delete</button>
        </div>
      `;
      listEl.appendChild(card);
    }
    
    if (typeof toast !== 'undefined') {
      toast.success(`Loaded ${channels.length} chat channel(s)`);
    }
  } catch (e) {
    console.error('[loadChatChannels] Error:', e);
    listEl.innerHTML = `<div class="empty-state"><div class="empty-state-icon" style="color: #ff0040;">⚠️</div><div class="empty-state-title" style="color: #ff0040;">Error loading chat channels</div><div class="empty-state-description">${escapeHtml(e.message)}</div></div>`;
    if (typeof toast !== 'undefined' && toast.error) {
      toast.error("Error loading chat channels: " + e.message);
    }
  }
}

async function saveTelegramConfig() {
  try {
    const db = q("db") || "acq.db";
    const params = new URLSearchParams({db});
    
    const botToken = document.getElementById('telegram_bot_token').value.trim();
    const chatId = document.getElementById('telegram_chat_id').value.trim();
    
    const payload = {
      telegram_bot_token: botToken,
      telegram_chat_id: chatId
    };
    
    await api(`/api/notify/config?${params.toString()}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    
    if (typeof toast !== 'undefined') {
      toast.success('Telegram configuration saved');
    }
  } catch (e) {
    console.error('[saveTelegramConfig] Error:', e);
    if (typeof toast !== 'undefined' && toast.error) {
      toast.error("Error saving Telegram config: " + e.message);
    }
  }
}

async function testTelegramConnection() {
  try {
    const db = q("db") || "acq.db";
    const params = new URLSearchParams({db});
    
    if (typeof toast !== 'undefined') {
      toast.info('Testing Telegram connection...');
    }
    
    // This would call a test endpoint if available
    // For now, just show a message
    if (typeof toast !== 'undefined') {
      toast.info('Test functionality coming soon');
    }
  } catch (e) {
    console.error('[testTelegramConnection] Error:', e);
    if (typeof toast !== 'undefined' && toast.error) {
      toast.error("Error testing connection: " + e.message);
    }
  }
}

async function deleteChannel(channelId) {
  if (!confirm(`Delete channel ${channelId}? This action cannot be undone.`)) return;
  
  try {
    const db = q("db") || "acq.db";
    const params = new URLSearchParams({db});
    
    await api(`/api/chat/channels/${channelId}?${params.toString()}`, {
      method: 'DELETE'
    });
    
    if (typeof toast !== 'undefined') {
      toast.success(`Channel ${channelId} deleted`);
    }
    await loadChatChannels();
  } catch (e) {
    console.error('[deleteChannel] Error:', e);
    if (typeof toast !== 'undefined' && toast.error) {
      toast.error("Error deleting channel: " + e.message);
    }
  }
}

function editChannel(channelId) {
  const db = q("db") || "acq.db";
  const params = new URLSearchParams({db});
  
  api(`/api/chat/channels/${channelId}?${params.toString()}`)
    .then(response => {
      const channel = response;
      document.getElementById('channel_id').value = channel.channel_id;
      document.getElementById('provider').value = channel.provider;
      document.getElementById('handle').value = channel.handle;
      document.getElementById('display_name').value = channel.display_name || '';
      document.getElementById('meta_json').value = JSON.stringify(channel.meta_json || {}, null, 2);
      
      // Change form to update mode
      const form = document.getElementById('create-channel-form');
      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.textContent = 'Update Channel';
      submitBtn.onclick = (e) => {
        e.preventDefault();
        updateChannel(channelId);
      };
      
      form.scrollIntoView({behavior: 'smooth'});
    })
    .catch(e => {
      console.error('[editChannel] Error:', e);
      if (typeof toast !== 'undefined' && toast.error) {
        toast.error("Error loading channel: " + e.message);
      }
    });
}

async function updateChannel(channelId) {
  const provider = document.getElementById('provider').value;
  const handle = document.getElementById('handle').value.trim();
  const displayName = document.getElementById('display_name').value.trim() || null;
  const metaJsonStr = document.getElementById('meta_json').value.trim();
  
  let metaJson = {};
  if (metaJsonStr) {
    try {
      metaJson = JSON.parse(metaJsonStr);
    } catch (e) {
      if (typeof toast !== 'undefined' && toast.error) {
        toast.error("Invalid JSON in meta_json field");
      }
      return;
    }
  }
  
  try {
    const db = q("db") || "acq.db";
    const params = new URLSearchParams({db});
    
    const response = await api(`/api/chat/channels/${channelId}?${params.toString()}`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        provider,
        handle,
        display_name: displayName,
        meta_json: metaJson
      })
    });
    
    if (typeof toast !== 'undefined') {
      toast.success(`Channel ${channelId} updated successfully`);
    }
    resetChannelForm();
    await loadChatChannels();
  } catch (e) {
    console.error('[updateChannel] Error:', e);
    if (typeof toast !== 'undefined' && toast.error) {
      toast.error("Error updating channel: " + e.message);
    }
  }
}

function testChannel(channelId) {
  if (typeof toast !== 'undefined') {
    toast.info(`Testing channel ${channelId}...`);
  }
  // Test functionality would go here
}

async function loadTelegramConfig() {
  try {
    const db = q("db") || "acq.db";
    const params = new URLSearchParams({db});
    
    const response = await api(`/api/notify/config?${params.toString()}`);
    
    if (response.telegram_bot_token) {
      document.getElementById('telegram_bot_token').value = response.telegram_bot_token;
    }
    if (response.telegram_chat_id) {
      document.getElementById('telegram_chat_id').value = response.telegram_chat_id;
    }
  } catch (e) {
    console.error('[loadTelegramConfig] Error:', e);
    // Config might not exist yet, that's okay
  }
}

document.getElementById('create-channel-form')?.addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const channelId = document.getElementById('channel_id').value.trim();
  const provider = document.getElementById('provider').value;
  const handle = document.getElementById('handle').value.trim();
  const displayName = document.getElementById('display_name').value.trim() || null;
  const metaJsonStr = document.getElementById('meta_json').value.trim();
  
  if (!channelId || !provider || !handle) {
    if (typeof toast !== 'undefined' && toast.error) {
      toast.error('Please fill in all required fields');
    }
    return;
  }
  
  let metaJson = {};
  if (metaJsonStr) {
    try {
      metaJson = JSON.parse(metaJsonStr);
    } catch (e) {
      if (typeof toast !== 'undefined' && toast.error) {
        toast.error("Invalid JSON in meta_json field");
      }
      return;
    }
  }
  
  try {
    const db = q("db") || "acq.db";
    const params = new URLSearchParams({db});
    
    const payload = {
      channel_id: channelId,
      provider,
      handle,
      display_name: displayName,
      meta_json: metaJson
    };
    
    const response = await api(`/api/chat/channels?${params.toString()}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    
    if (typeof toast !== 'undefined') {
      toast.success(`Chat channel ${channelId} created successfully`);
    }
    resetChannelForm();
    await loadChatChannels();
  } catch (e) {
    console.error('[createChannel] Error:', e);
    if (typeof toast !== 'undefined' && toast.error) {
      toast.error("Error creating chat channel: " + e.message);
    }
  }
});

function resetChannelForm() {
  document.getElementById('create-channel-form')?.reset();
  document.getElementById('provider').value = 'telegram';
  const submitBtn = document.getElementById('create-channel-form')?.querySelector('button[type="submit"]');
  if (submitBtn) {
    submitBtn.textContent = 'Create Channel';
    submitBtn.onclick = null;
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Load channels and config when page loads
(async function() {
  await new Promise(resolve => setTimeout(resolve, 100));
  if (typeof loadChatChannels === 'function') {
    await loadChatChannels();
  }
  await loadTelegramConfig();
})();

window.loadChatChannels = loadChatChannels;
window.saveTelegramConfig = saveTelegramConfig;
window.testTelegramConnection = testTelegramConnection;
window.deleteChannel = deleteChannel;
window.editChannel = editChannel;
window.testChannel = testChannel;
</script>
