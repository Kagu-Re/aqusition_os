# Nginx reverse proxy for Acquisition Engine
#
# You still need TLS termination. Options:
# - Use certbot + this server block with 443
# - Put this behind a load balancer that terminates TLS
#
# Endpoints:
# - /console/* -> console:8000
# - /api/*     -> public:8001
# - /healthz   -> public /health

server {
  listen 80;
  server_name example.com;

  # Basic security headers (baseline)
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  # Limit request body size (tune for your use case)
  client_max_body_size 2m;

  location /console/ {
    proxy_pass http://console:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass http://public:8001/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /healthz {
    proxy_pass http://public:8001/health;
  }
}
